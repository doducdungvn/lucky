<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đọ Thưởng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
        .matching-number {
            color: #ef4444;
            font-weight: 500;
        }
        .input-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-900">Đọ Thưởng</h1>
                <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Back
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <!-- Input Section -->
            <div class="p-6 border-b border-gray-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Numbers Input -->
                    <div>
                        <label for="numbers" class="block text-sm font-medium text-gray-700 mb-2">Nhập số</label>
                        <textarea id="numbers" rows="6" class="input-field w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Nhập số theo định dạng:&#10;123 100&#10;456 200"></textarea>
                        <div class="mt-3 flex items-center justify-end">
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="toggleExtraPanels" class="sr-only peer">
                                <div class="w-8 h-4 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-500"></div>
                                <span class="ml-2 text-sm font-medium text-gray-700">Tiện ích KQ & Nhập tắt</span>
                            </label>
                        </div>
                    </div>
                    <!-- Shortcuts Section -->
                    <div id="shortcutsPanel" class="hidden mt-6 grid grid-cols-1 gap-6">
                        <!-- Lottery Results Card (Ported from index.html) -->
                        <div id="lotteryResultsPanel" class="bg-white rounded-lg border border-gray-200 shadow-sm p-4 space-y-4">
                            <div class="flex justify-between items-center flex-wrap gap-2">
                            <label class="text-sm font-medium text-gray-700">Kết quả Xổ số:</label>
                            <div class="flex gap-1 text-xs">
                                <button type="button" id="btnSourceMinhNgoc" class="px-2.5 py-1 rounded bg-blue-500 text-white font-semibold border border-transparent">Minh Ngọc</button>
                                <button type="button" id="btnSourceXSKT" class="px-2.5 py-1 rounded bg-gray-200 text-gray-700 font-semibold border border-transparent">XSKT.com.vn</button>
                                <button type="button" id="btnSourceMKetqua" class="px-2.5 py-1 rounded bg-gray-200 text-gray-700 font-semibold border border-transparent">mketqua.net</button>
                            </div>
                            </div>
                            <div class="flex items-center justify-between bg-gray-50 p-2 rounded-lg flex-wrap gap-2 text-xs">
                            <div class="flex items-center gap-3 flex-wrap">
                                <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="autoFetchToggle" class="sr-only peer">
                                <div class="w-7 h-4 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-500"></div>
                                <span class="ml-2 text-xs font-medium text-gray-700">Tự động tải</span>
                                </label>
                                <input type="date" id="resultDateInput" class="border border-gray-300 rounded px-1.5 py-0.5 text-xs bg-white">
                            </div>
                            <span id="autoResultStatus" class="text-[10px] font-bold text-green-600 bg-green-100 px-2 py-0.5 rounded border border-green-200 hidden">Chưa tải</span>
                            <button type="button" id="btnFetchResults" class="px-2.5 py-1 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded transition-all active:scale-95 flex items-center gap-1 hidden">
                                <span id="fetchBtnSpinner" class="hidden animate-spin rounded-full h-2.5 w-2.5 border-b border-white"></span>
                                <span id="fetchBtnText">Tải KQ</span>
                            </button>
                            </div>
                            <div id="manualFields" class="grid grid-cols-1 md:grid-cols-12 gap-3">
                            <div class="md:col-span-3">
                                <label for="specialPrizeInput" class="block text-[11px] font-semibold text-gray-500 mb-1 uppercase">Giải ĐB</label>
                                <input type="text" id="specialPrizeInput" class="w-full border border-gray-300 rounded p-1.5 text-center font-bold tracking-widest text-green-600 bg-white" placeholder="e.g. 58495">
                            </div>
                            <div class="md:col-span-9">
                                <div class="flex justify-between items-center mb-1">
                                <label for="allPrizesInput" class="block text-[11px] font-semibold text-gray-500 uppercase">27 Giải</label>
                                <button type="button" id="normalizeButton" class="px-2 py-0.5 bg-gray-500 hover:bg-gray-400 text-white text-[10px] font-bold rounded transition-all active:scale-95">Chuẩn hóa 27</button>
                                </div>
                                <textarea id="allPrizesInput" rows="2" class="w-full border border-gray-300 rounded p-1.5 text-sm bg-white leading-relaxed font-mono" placeholder="Ví dụ: 09253, 77988..."></textarea>
                            </div>
                            </div>
                            <div id="twoDigitBoardContainer" class="hidden border-t border-gray-200 pt-3">
                            <label id="lbl27Giai" class="block text-[11px] font-semibold text-gray-500 mb-1 uppercase tracking-wider">27 Giải</label>
                            <div id="twoDigitBoard" class="flex flex-wrap gap-1 bg-gray-50 p-2.5 rounded-lg border border-gray-200 text-xs font-semibold"></div>
                            </div>
                        </div>
                        <!-- Shortcuts Input -->
                        <div>
                            <label for="shortcuts" class="block text-sm font-medium text-gray-700 mb-2">Nhập tắt</label>
                            <textarea id="shortcuts" rows="4" class="input-field w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Định dạng:&#10;kl=123.456&#10;mn=789.012"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Actions Row -->
                <div class="mt-4 p-3 bg-gray-50 rounded-lg flex flex-col md:flex-row md:items-center justify-between gap-4 border border-gray-100">
                    <!-- Retain Section -->
                    <div class="flex items-center gap-3">
                        <label for="retainNumber" class="text-sm font-medium text-gray-700 whitespace-nowrap">Giữ lại:</label>
                        <input type="number" id="retainNumber" value="0" class="w-20 p-1.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 text-center" onfocus="clearDefaultValue(this)" onblur="restoreDefaultValue(this)">
                        <div class="flex items-center gap-3 ml-2">
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" id="retainMoney" name="retainType" value="money" checked class="h-4 w-4 text-blue-600 focus:ring-blue-500">
                                <span class="ml-1 text-sm text-gray-700">Tiền</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" id="retainPercent" name="retainType" value="percentage" class="h-4 w-4 text-blue-600 focus:ring-blue-500">
                                <span class="ml-1 text-sm text-gray-700">%</span>
                            </label>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex flex-wrap gap-2">
                        <button id="calculateButton" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition-colors flex items-center gap-2 font-medium text-sm shadow-sm active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
                            </svg>
                            Tính toán
                        </button>
                        <button id="copyButton" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition-colors flex items-center gap-2 font-medium text-sm shadow-sm active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                                <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                            </svg>
                            Copy chuyển
                        </button>
                        <button id="copyInputListButton" class="px-4 py-2 bg-purple-500 text-white rounded hover:bg-purple-600 transition-colors flex items-center gap-2 font-medium text-sm shadow-sm active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z" />
                            </svg>
                            Copy input
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Results -->
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <h2 class="text-lg font-semibold text-gray-900">Kết quả:</h2>
                            <div class="flex flex-col items-end gap-2">
                                <div class="text-lg font-bold text-gray-900">Tổng: <span id="totalSum" class="text-blue-600">0</span></div>
                                <div class="flex gap-2 bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                                    <span class="text-xs text-gray-600 font-semibold mt-0.5">Tổng số:</span>
                                    <div id="numResults">0 con</div>
                                </div>
                            </div>
                        </div>
                        <div id="result" class="bg-gray-50 p-4 rounded-lg border border-gray-200 min-h-[200px]"></div>
                    </div>

                    <!-- Modified Results -->
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <h2 class="text-lg font-semibold text-gray-900">Chuyển:</h2>
                            <div class="flex flex-col items-end gap-2">
                                <div class="text-lg font-bold text-gray-900">Tổng: <span id="modifiedTotalSum" class="text-green-600">0</span></div>
                                <div class="flex gap-2 bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                                    <span class="text-xs text-gray-600 font-semibold mt-0.5">Tổng số:</span>
                                    <div id="modifiedNumResults">0 con</div>
                                </div>
                            </div>
                        </div>
                        <div id="modifiedResult" class="bg-gray-50 p-4 rounded-lg border border-gray-200 min-h-[200px]"></div>
                    </div>
                </div>

                <!-- Input List -->
                <div class="mt-6">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Chi tiết input</h2>
                    <div id="inputList" class="bg-gray-50 p-4 rounded-lg border border-gray-200 min-h-[100px]"></div>
                </div>
            </div>
        </div>
    </main>

function escapeHtml(str) {
  if (!str) return '';
  return str.toString()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function stripAccents(str) {
  return str.normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/đ/g, "d")
            .replace(/Đ/g, "D");
}

function normalizeBetLine(line) {
  let normalized = stripAccents(line.trim());
  normalized = normalized.replace(/[’‘ʼ＇`]/g, "'");
  normalized = normalized.replace(/(\d)\s*,\s*(\d)/g, '$1.$2');
  normalized = normalized.replace(/(\d)\s*\.\s*(\d)/g, '$1.$2');
  normalized = normalized.replace(/\b(?:dau\s+dit|dau\s+duoi)\s*(\d)(?![0-9])/gi, 'dau$1, dit$1');
  normalized = normalized.replace(/\b(?:dd)\s*(\d)(?![0-9])/gi, 'dau$1, dit$1');
  normalized = normalized.replace(/\b(?:kep lech)\b/gi, 'kl');
  normalized = normalized.replace(/\b(?:lip|kep)\b/gi, 'k');
  normalized = normalized.replace(/\b(?:dau)\s*(\d)(?![0-9])/gi, 'dau$1');
  normalized = normalized.replace(/\b(?:dit|duoi)\s*(\d)(?![0-9])/gi, 'dit$1');
  normalized = normalized.replace(/\b(?:cham)\s*(\d)(?![0-9])/gi, 'cham$1');
  normalized = normalized.replace(/\b(?:tong)\s*(\d)(?![0-9])/gi, 't$1');
  normalized = normalized.replace(/\b(?:d)\s*(\d)(?![0-9])/gi, 'd$1');
  normalized = normalized.replace(/\b(?:t)\s*(\d)(?![0-9])/gi, 't$1');
  normalized = normalized.replace(/\b(?:bo|he)\s*(\d{1,2})(?![0-9])/gi, 'bo$1');
  normalized = normalized.replace(/\b(?:moi con bang|moi con)\b/gi, 'mc');
  normalized = normalized.replace(/\s*[,.]\s*(?==|x|mc|moi\s+con|\+|\*)/gi, ' ');
  normalized = normalized.replace(/([a-z0-9])\s*(mỗi\s+con\s*=?|moi\s+con\s*=?|mc\s*=|mc|=\s*mc|=|\+|\*|x)\s*(\d+(?:\.\d+)?)(?:\s*(?:d|đ|₫|k|n)(?=[\s.,;\-\d]|$))?(?![a-z0-9])/gi, '$1x$3');
  normalized = normalized.replace(/\bmc\s*(\d+(?:\.\d+)?)(?:\s*(?:d|đ|₫|k|n)(?=[\s.,;\-\d]|$))?(?![a-z0-9])/gi, 'x$1');
  normalized = normalized.replace(/\s+(\d+(?:\.\d+)?)\s*(?:d|đ|₫|k|n)(?![a-z0-9])/gi, ' x$1');
  return normalized;
}

function normalizeShorthandToken(token) {
  let t = token.trim().toLowerCase().replace(/[’‘ʼ＇`]/g, "'");
  const dauMatch = t.match(/^dau(\d)$/);
  if (dauMatch) return 'd' + dauMatch[1];
  const ditMatch = t.match(/^dit(\d)$/);
  if (ditMatch) return "d'" + ditMatch[1];
  const heBoMatch = t.match(/^(he|bo)(\d{1,2})$/);
  if (heBoMatch) {
    let num = heBoMatch[2];
    if (num.length === 1) num = '0' + num;
    return 'h' + num;
  }
  const aliases = {
    'chanle': 'cl',
    'lechan': 'lc',
    'chanchan': 'cc',
    'lele': 'll',
    'dc': 'dauchan',
    'dl': 'daule',
    'dt': 'dauto',
    'db': 'daube',
    'tb': 'tobe',
    'tt': 'toto',
    'bt': 'beto',
    'bb': 'bebe',
    'tc': 'tongchan',
    'tl': 'tongle'
  };
  return aliases[t] || t;
}

function resolveShorthands(numbersString) {
  let s = numbersString;
  const shortcutsInput = document.getElementById("shortcuts")?.value || "";
  const shortcutsArray = shortcutsInput.split("\n");
  const customShortcuts = {};
  for (let i = 0; i < shortcutsArray.length; i++) {
    const shortcutParts = shortcutsArray[i].split("=");
    const shortcutName = shortcutParts[0]?.trim().toLowerCase();
    const shortcutValue = shortcutParts[1]?.trim();
    if (shortcutName && shortcutValue) {
      customShortcuts[shortcutName] = shortcutValue;
    }
  }

  const combinedRegex = /(dau|dit|d'|d|he|bo|t|cham)([0-9]{1,2})((?:[.,\-\s]+[0-9]{1,2})+)/gi;
  s = s.replace(combinedRegex, (match, prefix, firstDigit, rest) => {
    const digits = rest.split(/[^0-9]+/).filter(Boolean);
    const expanded = [prefix + firstDigit, ...digits.map(d => prefix + d)];
    return expanded.join(',');
  });

  const parts = s.split(/([.,\-\s]+)/);
  const resolvedParts = parts.map(part => {
    const trimmed = part.trim().toLowerCase();
    if (!trimmed) return part;
    if (customShortcuts[trimmed]) return customShortcuts[trimmed];
    const normalized = normalizeShorthandToken(part);
    if (customShortcuts[normalized]) return customShortcuts[normalized];
    if (shorthands[normalized]) return shorthands[normalized];
    return part;
  });
  return resolvedParts.join('');
}

function parseNumbersFromBetString(numbersString, betType) {
  const segments = numbersString.split(/[.,\-\s]+/).filter(s => s.length > 0);
  const numbers = []; 
  segments.forEach(seg => {
    if (!/^\d+$/.test(seg)) return;
    if (betType === 'de' || betType === 'lo') {
      if (seg.length === 1) {
        numbers.push('0' + seg);
      } else if (seg.length === 2) {
        numbers.push(seg);
      } else if (seg.length === 3) {
        if (seg.charAt(0) === seg.charAt(2)) {
          numbers.push(seg.substring(0, 2));
          numbers.push(seg.substring(1, 3));
        }
      }
    } else if (betType === 'xien' || betType === 'xienquay') {
      if (seg.length === 2) {
        numbers.push(seg);
      } else if (seg.length === 3) {
        if (seg.charAt(0) === seg.charAt(2)) {
          numbers.push(seg.substring(0, 2));
          numbers.push(seg.substring(1, 3));
        }
      }
    } else if (betType === 'bacang' || betType === 'bacang_lo') {
      if (seg.length === 3) {
        numbers.push(seg);
      }
    }
  });
  return numbers;
}

function parseCombinedInput(inputString) {
  let processedInput = inputString.replace(/[’‘ʼ＇`]/g, "'");
  const keywordRegex = /(^|[\s,;])(xienquay|xquay|xienq|3cang|3càng|3\s+càng|3\s+cang|quay|xien|xiên|3cl|xq|de|đề|đê|đe|dê|dè|đè|Dè|Đè|dề|Dề|lo|lô|3c|bc|càng|cang|d|đ|l|c|q|x)(\d)/gi;
  processedInput = processedInput.replace(keywordRegex, "$1$2 $3");
  const sameLinePattern = /[\s,;]+(xienquay|xq|xienq|quay|q|xquay|lô\s+xiên|lo\s+xien|đề|de|đê|đe|dê|dè|đè|Dè|Đè|dề|Dề|lô|lo|l|xiên|xien|x2|x3|x4)(?=[\s.,;\-\d]|$)|[\s,;]+(3càng|3cang|3\s+càng|3\s+cang|3c|3clô|3clo|3cl|bc|càng|cang)(?=[\s.,;\-\d]|$)|[\s,;]+(d|đ|l|c)(?=[\s.,;\-\d]|$)(?=\s+[a-z0-9'’‘＇`\u00C0-\u024F\u1E00-\u1EFF])/gi;
  processedInput = processedInput.replace(sameLinePattern, (match) => {
    return "\n" + match.replace(/^[\s,;]+/g, '').trim();
  });

  const betSplitRegex = /([a-z0-9])\s*((?:mỗi\s+con\s*=?|moi\s+con\s*=?|mc\s*=|mc|=\s*mc|=|\+|\*|x)\s*\d+(?:\.\d+)?(?:\s*(?:d|đ|₫|k|n)(?=[\s.,;\-\d]|$))?)\b[\s.,;\-]+(?=[^\s.,;\-])/gi;
  processedInput = processedInput.replace(betSplitRegex, '$1$2\n');

  const lines = processedInput.split('\n');
  const parsedBets = {
    de: [],
    lo: [],
    xien2: [],
    xien3: [],
    xien4: [],
    bacang: [],
    bacang_lo: [],
    rawOrder: []
  };

  const typeRegex = {
    de: /^(de|d|đề|đê|đe|dê|dè|đè|Dè|Đè|dề|Dề)$/i,
    lo: /^(lo|lô|l)$/i,
    xienquay: /^(xienquay|xq|xienq|quay|q|xquay)$/i,
    xien: /^(lo\s+xien|xien|x|x2|x3|x4)$/i,
    bacang: /^(3cang|3c|c|bc|cang|3\s+cang)$/i,
    bacang_lo: /^(3clo|3cl)$/i
  };

  let activeCategory = 'de';

  lines.forEach(line => {
    let originalLine = line.trim();
    if (!originalLine) return;

    let trimmed = normalizeBetLine(originalLine);

    let lineType = '';
    const spaceMatch = trimmed.match(/^(xienquay|xq|xienq|quay|q|xquay|lo\s+xien|de|lo|xien|x|x2|x3|x4|3cang|3c|3clo|3cl|d|l|c|bc|cang|3\s+cang)(?:\s+(.*))?$/i);
    if (spaceMatch) {
      const rawType = spaceMatch[1].toLowerCase();
      if (typeRegex.de.test(rawType)) lineType = 'de';
      else if (typeRegex.lo.test(rawType)) lineType = 'lo';
      else if (typeRegex.xienquay.test(rawType)) lineType = 'xienquay';
      else if (typeRegex.xien.test(rawType)) lineType = 'xien';
      else if (typeRegex.bacang.test(rawType)) lineType = 'bacang';
      else if (typeRegex.bacang_lo.test(rawType)) lineType = 'bacang_lo';

      if (lineType) {
        activeCategory = lineType;
        trimmed = spaceMatch[2] ? spaceMatch[2].trim() : '';
        if (trimmed === '') {
          return; // Standalone category header line - do not treat as error
        }
      }
    }

    if (!lineType) lineType = activeCategory;

    let parsedCountBefore = parsedBets.de.length + parsedBets.lo.length + parsedBets.xien2.length + parsedBets.xien3.length + parsedBets.xien4.length + parsedBets.bacang.length + parsedBets.bacang_lo.length;

    const groupRegex = /([a-wy-z0-9'.,\-\s]+)([x+*])(\d+(?:\.\d+)?)/gi;
    let groupMatch;
    while ((groupMatch = groupRegex.exec(trimmed)) !== null) {
      const rawNumString = groupMatch[1].trim();
      const amount = parseFloat(groupMatch[3]);
      if (amount <= 0 || isNaN(amount)) continue;

      const numString = resolveShorthands(rawNumString);
      const numbers = parseNumbersFromBetString(numString, lineType);
      
      let isValidGroup = (numbers.length > 0);
      if (isValidGroup) {
        let parsedNumbersCount = 0;
        const segments = numString.split(/[.,\-\s]+/).filter(s => s.length > 0);
        segments.forEach(seg => {
          if (!/^\d+$/.test(seg)) {
            const isShorthand = /^(kl|k|dau\d|dit\d|cham\d|t\d|bo\d{1,2})$/i.test(seg);
            if (isShorthand) {
              if (lineType !== 'de' && lineType !== 'lo') {
                isValidGroup = false;
              } else {
                parsedNumbersCount += 2;
              }
            } else {
              isValidGroup = false;
            }
            return;
          }
          if (lineType === 'de' || lineType === 'lo') {
            if (seg.length === 2) {
              parsedNumbersCount += 1;
            } else if (seg.length === 3) {
              if (seg.charAt(0) === seg.charAt(2)) {
                parsedNumbersCount += 2;
              } else {
                isValidGroup = false;
              }
            } else {
              isValidGroup = false;
            }
          } else if (lineType === 'xien' || lineType === 'xienquay') {
            if (seg.length === 2) {
              parsedNumbersCount += 1;
            } else if (seg.length === 3) {
              if (seg.charAt(0) === seg.charAt(2)) {
                parsedNumbersCount += 2;
              } else {
                isValidGroup = false;
              }
            } else {
              isValidGroup = false;
            }
          } else if (lineType === 'bacang' || lineType === 'bacang_lo') {
            if (seg.length === 3) {
              parsedNumbersCount += 1;
            } else {
              isValidGroup = false;
            }
          }
        });

        if ((lineType === 'xien' || lineType === 'xienquay') && parsedNumbersCount < 2) {
          isValidGroup = false;
        }
      }

      if (!isValidGroup) {
        parsedBets.rawOrder.push({
          type: 'invalid',
          originalLine: originalLine,
          invalidText: groupMatch[0],
          amount: 0
        });
        continue;
      }

      if (lineType === 'xien') {
        if (numbers.length >= 2 && numbers.length <= 4) {
          const item = {
            numbers: numbers,
            amount: amount
          };
          parsedBets[`xien${numbers.length}`].push(item);
          parsedBets.rawOrder.push({
            type: `xien${numbers.length}`,
            originalLine: originalLine,
            numbers: numbers,
            amount: amount
          });
        }
      } else if (lineType === 'xienquay') {
        if (numbers.length >= 2) {
          const getCombos = (arr, k) => {
            const result = [];
            const fork = (i, combo) => {
              if (combo.length === k) {
                result.push(combo);
                return;
              }
              if (i === arr.length) return;
              fork(i + 1, [...combo, arr[i]]);
              fork(i + 1, combo);
            };
            fork(0, []);
            return result;
          };

          for (let size = 2; size <= 4; size++) {
            if (numbers.length >= size) {
              const combos = getCombos(numbers, size);
              combos.forEach(combo => {
                const item = {
                  numbers: combo,
                  amount: amount
                };
                parsedBets[`xien${size}`].push(item);
                parsedBets.rawOrder.push({
                  type: `xien${size}`,
                  originalLine: originalLine,
                  numbers: combo,
                  amount: amount
                });
              });
            }
          }
        }
      } else {
        numbers.forEach(num => {
          const item = {
            numbers: [num],
            amount: amount
          };
          parsedBets[lineType].push(item);
          parsedBets.rawOrder.push({
            type: lineType,
            originalLine: originalLine,
            numbers: [num],
            amount: amount
          });
        });
      }
    }

    let parsedCountAfter = parsedBets.de.length + parsedBets.lo.length + parsedBets.xien2.length + parsedBets.xien3.length + parsedBets.xien4.length + parsedBets.bacang.length + parsedBets.bacang_lo.length;
    if (parsedCountAfter === parsedCountBefore) {
      parsedBets.rawOrder.push({
        type: 'invalid',
        originalLine: originalLine,
        amount: 0
      });
    }
  });

  return parsedBets;
}

// Visual layout helper for 2-digit board
function updateTwoDigitBoard() {
  const specialPrizeInput = document.getElementById('specialPrizeInput');
  const allPrizesInput = document.getElementById('allPrizesInput');
  const board = document.getElementById('twoDigitBoard');
  const container = document.getElementById('twoDigitBoardContainer');
  const lbl27Giai = document.getElementById('lbl27Giai');

  if (!specialPrizeInput || !allPrizesInput || !board || !container) return;

  const specialPrize = specialPrizeInput.value.trim();
  const allPrizesRaw = allPrizesInput.value.trim();

  if (!specialPrize || !allPrizesRaw) {
    container.classList.add('hidden');
    return;
  }

  const prizes = allPrizesRaw.split(/[\s,]+/).filter(Boolean);
  if (prizes.length === 0) {
    container.classList.add('hidden');
    return;
  }

  container.classList.remove('hidden');
  const deNumber = specialPrize.slice(-2);
  const bacangDe = specialPrize.length >= 3 ? specialPrize.slice(-3) : specialPrize;
  
  if (lbl27Giai) {
    lbl27Giai.innerHTML = `<span class="text-red-600 dark:text-red-400 font-bold">GIẢI ĐẶC BIỆT</span> <span class="text-red-500 font-black text-lg ml-1">${bacangDe}</span>`;
  }

  // Extract last 2 digits and sort
  const digits = prizes.map(p => p.slice(-2));
  digits.sort((a, b) => parseInt(a, 10) - parseInt(b, 10));
  
  let html = "";
  digits.forEach((last2) => {
    const isDe = last2 === deNumber;
    const bgClass = isDe 
      ? 'bg-red-600 dark:bg-red-500 text-white font-extrabold px-2 py-0.5 rounded shadow' 
      : 'bg-gray-200 dark:bg-dark-700 text-gray-800 dark:text-gray-200 px-2 py-0.5 rounded border border-gray-300 dark:border-gray-600';
      
    html += `<span class="${bgClass}">${last2}</span>`;
  });
  
  board.innerHTML = html;
}

function isToday(dateString) {
  if (!dateString) return true;
  const localDate = new Date(Date.now() - (new Date().getTimezoneOffset()*60*1000)).toISOString().split('T')[0];
  return dateString === localDate;
}

function formatDateDDMMYYYY(dateString) {
  if (!dateString) return '';
  const parts = dateString.split('-');
  return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

async function triggerAutoFetch() {
  const fetchBtnSpinner = document.getElementById('fetchBtnSpinner');
  const fetchBtnText = document.getElementById('fetchBtnText');
  const btnFetchResults = document.getElementById('btnFetchResults');
  const autoResultStatus = document.getElementById('autoResultStatus');
  const resultDateInput = document.getElementById('resultDateInput');
  const specialPrizeInput = document.getElementById('specialPrizeInput');
  const allPrizesInput = document.getElementById('allPrizesInput');

  if (!btnFetchResults) return;

  if (fetchBtnSpinner) fetchBtnSpinner.classList.remove('hidden');
  if (fetchBtnText) fetchBtnText.innerText = 'Đang tải...';
  btnFetchResults.disabled = true;
  if (autoResultStatus) {
    autoResultStatus.innerText = 'Đang tải...';
    autoResultStatus.className = 'text-[10px] font-bold text-indigo-600 bg-indigo-50 dark:bg-indigo-950/20 dark:text-indigo-400 px-2 py-0.5 rounded border border-indigo-200 dark:border-indigo-900/30';
    autoResultStatus.classList.remove('hidden');
  }

  const targetDate = resultDateInput ? resultDateInput.value : '';

  try {
    let data = null;
    let errors = [];

    // Try selected source first
    if (currentSource === 'minhngoc') {
      try { data = await fetchFromMinhNgoc(targetDate); } catch (e) { errors.push("Minh Ngọc: " + e.message); }
    } else if (currentSource === 'xskt') {
      try { data = await fetchFromXSKT(targetDate); } catch (e) { errors.push("XSKT: " + e.message); }
    } else {
      try { data = await fetchFromMKetqua(targetDate); } catch (e) { errors.push("mketqua: " + e.message); }
    }

    // Fallback chain
    if (!data && currentSource !== 'minhngoc') {
      try { data = await fetchFromMinhNgoc(targetDate); } catch (e) { errors.push("Minh Ngọc (fallback): " + e.message); }
    }
    if (!data && currentSource !== 'xskt') {
      try { data = await fetchFromXSKT(targetDate); } catch (e) { errors.push("XSKT (fallback): " + e.message); }
    }
    if (!data && currentSource !== 'mketqua') {
      try { data = await fetchFromMKetqua(targetDate); } catch (e) { errors.push("mketqua (fallback): " + e.message); }
    }

    if (!data) {
      throw new Error(errors.join(" | "));
    }

    // Visual sync source buttons
    updateSourceButtons(data.sourceName);

    fetchedPrizesData = data;
    const dayMonth = data.dateText.split('/').slice(0, 2).join('/');
    if (autoResultStatus) {
      autoResultStatus.innerText = `Tải Ok! ${dayMonth}`;
      autoResultStatus.className = 'text-[10px] font-bold text-emerald-600 bg-emerald-100 dark:bg-emerald-950/20 dark:text-emerald-400 px-2 py-0.5 rounded border border-emerald-200 dark:border-emerald-900/30';
      autoResultStatus.classList.remove('hidden');
    }
    
    if (specialPrizeInput) specialPrizeInput.value = data.specialPrize;
    if (allPrizesInput) allPrizesInput.value = data.prizes.join(', ');

    updateTwoDigitBoard();

  } catch (error) {
    console.error(error);
    if (autoResultStatus) {
      autoResultStatus.innerText = `Lỗi!`;
      autoResultStatus.className = 'text-[10px] font-bold text-rose-600 bg-rose-100 dark:bg-rose-950/20 dark:text-rose-400 px-2 py-0.5 rounded border border-rose-200 dark:border-rose-900/30';
      autoResultStatus.classList.remove('hidden');
    }
  } finally {
    if (fetchBtnSpinner) fetchBtnSpinner.classList.add('hidden');
    if (fetchBtnText) fetchBtnText.innerText = 'Tải KQ';
    btnFetchResults.disabled = false;
  }
}

}

async function fetchHtmlWithProxy(targetUrl) {
  try {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&cache=${(new Date()).getTime()}`);
    if (!res.ok) throw new Error();
    const json = await res.json();
    if (json.contents) return json.contents;
  } catch (e) {
    console.warn("Proxy allorigins failed, trying corsproxy...");
  }
  const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
  if (!res.ok) throw new Error("Cả 2 dịch vụ proxy đều không tải được dữ liệu.");
  return await res.text();
}

async function fetchFromMinhNgoc(dateStr) {
  const useMain = !dateStr || isToday(dateStr);

    : `https://www.minhngoc.net.vn/xo-so-mien-bac/ngay-${formatDateDDMMYYYY(dateStr)}.html`;

  const titleEl = box.querySelector('.title');
  const dateText = titleEl ? titleEl.textContent.trim().replace("KẾT QUẢ XỔ SỐ Miền Bắc - ", "") : "";
  const divs = box.querySelectorAll('td[class^="giai"] div');

async function fetchFromXSKT(dateStr) {

// Calculation Engine
function calculateSum() {
  saveShortcuts();

  const inputEl = document.getElementById("combinedBetInput") || document.getElementById("numbers");
  if (!inputEl) return;
  const inputString = inputEl.value;

  const allPrizesEl = document.getElementById("allPrizesInput") || document.getElementById("twentySevenNumbers");
  const allPrizesRaw = allPrizesEl ? allPrizesEl.value.trim() : "";
  const allPrizes = allPrizesRaw ? allPrizesRaw.split(/[\s,]+/).filter(Boolean) : [];

  const specialPrizeEl = document.getElementById("specialPrizeInput") || document.getElementById("specialPrize");
  let specialPrizeRaw = specialPrizeEl ? specialPrizeEl.value.trim() : "";
  if (!specialPrizeRaw && allPrizes.length > 0) {
    specialPrizeRaw = allPrizes[0];
  }
  const specialPrizeLast2 = specialPrizeRaw ? specialPrizeRaw.slice(-2) : "";
  const specialPrizeLast3 = specialPrizeRaw ? specialPrizeRaw.slice(-3) : "";

  const allPrizesLast2 = allPrizes.map(p => p.slice(-2));
  const allPrizesLast3 = allPrizes.filter(p => p.length >= 3).map(p => p.slice(-3));

  const parseVal = (id, fallback) => {
    const el = document.getElementById(id);
    if (!el) return fallback;
    const valStr = el.value || '';
    const cleaned = valStr.toString().replace(/,/g, '.').trim();
    const parsed = parseFloat(cleaned);
    return isNaN(parsed) ? fallback : parsed;
  };

  const deComm = parseVal('rateDeComm', 82);
  const dePayout = parseVal('rateDePayout', 80);
  const loCost = parseVal('rateLoCost', 23000);
  const loPayout = parseVal('rateLoPayout', 80000);
  const xienComm = parseVal('rateXienComm', 65);
  const x2Payout = parseVal('rateXien2Payout', 15);
  const x3Payout = parseVal('rateXien3Payout', 50);
  const x4Payout = parseVal('rateXien4Payout', 120);
  const baCangComm = parseVal('rate3CComm', 75);
  const baCangPayout = parseVal('rate3CPayout', 400);
  const baCangApMa = parseVal('rate3CApMa', 5);
  const baCangLoCost = parseVal('rate3CLoCost', 75);
  const baCangLoPayout = parseVal('rate3CLoPayout', 960);

  const getLoCostFactor = (val) => {
    if (val < 100) return val;
    if (val < 10000) return val / 100;
    return val / 1000;
  };
  const getLoPayoutFactor = (val) => {
    if (val < 1000) return val;
    return val / 1000;
  };

  const loCostFactor = getLoCostFactor(loCost);
  const loPayoutFactor = getLoPayoutFactor(loPayout);

  const parsedBets = parseCombinedInput(inputString);

  const resultDiv = document.getElementById("result");
  const modifiedResultDiv = document.getElementById("modifiedResult");
  const inputListDiv = document.getElementById("inputList");

  if (resultDiv) resultDiv.innerHTML = "";
  if (modifiedResultDiv) modifiedResultDiv.innerHTML = "";
  if (inputListDiv) inputListDiv.innerHTML = "";
  let deBetSum = 0;
  let deWinSum = 0;
  let loBetSum = 0;
  let loWinSum = 0;
  let xienBetSum = 0;
  let xienWinSum = 0;
  let baCangBetSum = 0;
  let baCangWinSum = 0;

  // New variables for detailed calculations
  let baCangDeBetSum = 0;
  let baCangDeWinSum = 0;
  let baCangDeApMaWinSum = 0;
  let baCangLoBetSum = 0;
  let baCangLoWinSum = 0;

  let totalUniquePairs = 0;
  let totalBetCount = 0;
  let totalBetValue = 0;

  const renderDetail = (numStr, amount, type, occurrences = 0) => {
    if (!inputListDiv) return;
    const li = document.createElement("li");
    let text = `${type} ${numStr}x${amount}`;
    if (occurrences > 0) {
      li.innerHTML = `<span class="matching-number">${type} ${numStr}x${amount}</span>`;
      if (occurrences > 1) {
        li.innerHTML += ` <span class="matching-number">(${occurrences} nháy)</span>`;
      }
    } else {
      li.textContent = text;
    }
    inputListDiv.appendChild(li);
    totalBetCount++;
    totalBetValue += amount;
  };

  // 1. Đề
  const deSums = {};
  parsedBets.de.forEach(bet => {
    const num = bet.numbers[0];
    deSums[num] = (deSums[num] || 0) + bet.amount;
    deBetSum += bet.amount;

    const isMatch = num === specialPrizeLast2;
    if (isMatch) {
      deWinSum += bet.amount;
    }
  });

  // 2. Lô
  const loSums = {};
  parsedBets.lo.forEach(bet => {
    const num = bet.numbers[0];
    loSums[num] = (loSums[num] || 0) + bet.amount;
    loBetSum += bet.amount;

    const occurrences = allPrizesLast2.filter(p => p === num).length;
    if (occurrences > 0) {
      loWinSum += occurrences * bet.amount;
    }
  });

  // 3. Xiên
  const xienBetsRaw = [...parsedBets.xien2, ...parsedBets.xien3, ...parsedBets.xien4];
  const xienSumsMap = {};
  xienBetsRaw.forEach(bet => {
    const key = bet.numbers.join('-');
    xienSumsMap[key] = (xienSumsMap[key] || 0) + bet.amount;
  });
  const xienBets = Object.entries(xienSumsMap).map(([key, amount]) => ({
    numbers: key.split('-'),
    amount: amount
  }));
  xienBets.forEach(bet => {
    const size = bet.numbers.length;
    xienBetSum += bet.amount;

    const allHit = bet.numbers.every(num => allPrizesLast2.includes(num));
    if (allHit) {
      const winRate = size === 2 ? x2Payout : (size === 3 ? x3Payout : x4Payout);
      xienWinSum += bet.amount * winRate;
    }
  });

  // 4. 3 Càng & 3 Càng Lô
  const baCangSums = {};
  parsedBets.bacang.forEach(bet => {
    const num = bet.numbers[0];
    baCangSums[num] = (baCangSums[num] || 0) + bet.amount;
    baCangBetSum += bet.amount;
    baCangDeBetSum += bet.amount;

    const match3 = num === specialPrizeLast3;
    const match2 = num.slice(-2) === specialPrizeLast2;
    if (match3) {
      baCangWinSum += bet.amount * 400;
      baCangDeWinSum += bet.amount;
    } else if (match2) {
      baCangWinSum += bet.amount * 5;
      baCangDeApMaWinSum += bet.amount;
    }
  });

  // 3 Càng Lô
  parsedBets.bacang_lo.forEach(bet => {
    const num = bet.numbers[0];
    const costInThousands = bet.amount * (baCangLoCost / 100);
    baCangBetSum += costInThousands;
    baCangLoBetSum += bet.amount;

    const occurrences = allPrizesLast3.filter(p => p === num).length;
    if (occurrences > 0) {
      baCangWinSum += occurrences * bet.amount * baCangLoPayout;
      baCangLoWinSum += occurrences * bet.amount;
    }
  });

  // Render detail in original entry order
  parsedBets.rawOrder.forEach(bet => {
    if (bet.type === "invalid") {
      const li = document.createElement("li");
      li.innerHTML = `<span class="text-rose-600 dark:text-rose-400 font-bold bg-rose-50 dark:bg-rose-950/20 px-2 py-0.5 rounded border border-rose-200 dark:border-rose-900/30 text-xs">❌ Lỗi cú pháp: ${escapeHtml(bet.originalLine || bet.invalidText || '')}</span>`;
      inputListDiv.appendChild(li);
      return;
    }
    
    let occurrences = 0;
    const num = bet.numbers ? bet.numbers[0] : '';
    const typeLabel = bet.type === "de" ? "Đề" : (bet.type === "lo" ? "Lô" : (bet.type.startsWith("xien") ? `Xiên${bet.numbers.length}` : (bet.type === "bacang" ? "3C" : "3CLô")));
    
    if (bet.type === "de") {
      occurrences = num === specialPrizeLast2 ? 1 : 0;
    } else if (bet.type === "lo") {
      occurrences = allPrizesLast2.filter(p => p === num).length;
    } else if (bet.type.startsWith("xien")) {
      const allHit = bet.numbers.every(n => allPrizesLast2.includes(n));
      occurrences = allHit ? 1 : 0;
    } else if (bet.type === "bacang") {
      const match3 = num === specialPrizeLast3;
      const match2 = num.slice(-2) === specialPrizeLast2;
      occurrences = match3 ? 1 : (match2 ? 0.5 : 0);
    } else if (bet.type === "bacang_lo") {
      occurrences = allPrizesLast3.filter(p => p === num).length;
    }

    const numStr = bet.type.startsWith("xien") ? bet.numbers.join('-') : num;
    renderDetail(numStr, bet.amount, typeLabel, occurrences);
  });

  // Render Kết quả column
  const renderGroupResult = (title, sumsMap, isLoto = false) => {
    if (!resultDiv) return;
    const sorted = Object.entries(sumsMap).sort((a, b) => b[1] - a[1]);
    if (sorted.length === 0) return;

    const header = document.createElement("div");
    header.innerHTML = `<strong>${title}</strong>`;
    header.className = "mt-2 border-b border-gray-100 dark:border-gray-700 pb-1 text-emerald-600 dark:text-emerald-500 text-xs";
    resultDiv.appendChild(header);

    sorted.forEach(([key, value]) => {
      const div = document.createElement("div");
      const suffix = title.includes("Lô(đ)") ? 'đ' : '';
      div.textContent = `${key} = ${value}${suffix}`;
      totalUniquePairs++;

      let isWin = false;
      let hitText = "";
      
      const isLotoType = title.includes("Lô") || title.includes("3cLô");
      if (isLotoType) {
        const targetList = key.length === 3 ? allPrizesLast3 : allPrizesLast2;
        const occurrences = targetList.filter(p => p === key).length;
        if (occurrences > 0) {
          isWin = true;
          hitText = occurrences > 1 ? ` (${occurrences} nháy)` : " (Trúng)";
        }
      } else {
        if (key.length === 3) {
          if (key === specialPrizeLast3) {
            isWin = true;
            hitText = " (Trúng)";
          } else if (key.slice(-2) === specialPrizeLast2) {
            isWin = true;
            hitText = " (Áp má)";
          }
        } else {
          if (key === specialPrizeLast2) {
            isWin = true;
            hitText = " (Trúng)";
          }
        }
      }

      if (isWin) {
        div.className = "matching-number";
        div.textContent += hitText;
      }
      resultDiv.appendChild(div);
    });
  };

  // 1. Calculations for Kết quả column
  const deVon = deBetSum * (deComm / 100);
  const deTrung = deWinSum * dePayout;
  const deNet = deVon - deTrung;

  const loVon = loBetSum * loCostFactor;
  const loTrung = loWinSum * loPayoutFactor;
  const loNet = loVon - loTrung;

  const xienVon = xienBetSum * (xienComm / 100);
  const xienTrung = xienWinSum;
  const xienNet = xienVon - xienTrung;

  const baCangVon = baCangDeBetSum * (baCangComm / 100);
  const baCangTrung = baCangDeWinSum * baCangPayout + baCangDeApMaWinSum * baCangApMa;
  const baCangNet = baCangVon - baCangTrung;

  // 3 Càng Lô sums map
  const baCangLoSums = {};
  parsedBets.bacang_lo.forEach(bet => {
    const num = bet.numbers[0];
    baCangLoSums[num] = (baCangLoSums[num] || 0) + bet.amount;
  });
  const baCangLoVon = baCangLoBetSum * (baCangLoCost / 100);
  const baCangLoTrung = baCangLoWinSum * baCangLoPayout;
  const baCangLoNet = baCangLoVon - baCangLoTrung;

  const totalVon = deVon + loVon + xienVon + baCangVon + baCangLoVon;
  const totalTrung = deTrung + loTrung + xienTrung + baCangTrung + baCangLoTrung;
  const totalNet = totalVon - totalTrung;

  // 2. Calculations for Chuyển column
  const retainNumber = parseInt(document.getElementById("retainNumber")?.value) || 0;
  const retainType = document.querySelector('input[name="retainType"]:checked')?.value || "money";

  const getLayoffValues = (sumsMap, getPayoutFn) => {
    let costSum = 0;
    let winSum = 0;
    Object.entries(sumsMap).forEach(([key, value]) => {
      let modifiedSum = retainType === "money" ? value - retainNumber : value - (value * (retainNumber / 100));
      if (modifiedSum >= 1) {
        modifiedSum = Math.trunc(modifiedSum);
        costSum += modifiedSum;
        winSum += getPayoutFn(key, modifiedSum);
      }
    });
    return { costSum, winSum };
  };

  const deLayoff = getLayoffValues(deSums, (key, amt) => (key === specialPrizeLast2 ? amt * dePayout : 0));
  const deVonChuyen = deLayoff.costSum * (deComm / 100);
  const deTrungChuyen = deLayoff.winSum;

  const loLayoff = getLayoffValues(loSums, (key, amt) => {
    const occurrences = allPrizesLast2.filter(p => p === key).length;
    return occurrences * amt * loPayoutFactor;
  });
  const loVonChuyen = loLayoff.costSum * loCostFactor;
  const loTrungChuyen = loLayoff.winSum;

  let xienVonChuyen = 0;
  let xienTrungChuyen = 0;
  xienBets.forEach(bet => {
    let modifiedSum = retainType === "money" ? bet.amount - retainNumber : bet.amount - (bet.amount * (retainNumber / 100));
    if (modifiedSum >= 1) {
      modifiedSum = Math.trunc(modifiedSum);
      xienVonChuyen += modifiedSum * (xienComm / 100);
      const allHit = bet.numbers.every(num => allPrizesLast2.includes(num));
      if (allHit) {
        const size = bet.numbers.length;
        const winRate = size === 2 ? x2Payout : (size === 3 ? x3Payout : x4Payout);
        xienTrungChuyen += modifiedSum * winRate;
      }
    }
  });

  const baCangLayoff = getLayoffValues(baCangSums, (key, amt) => {
    const match3 = key === specialPrizeLast3;
    const match2 = key.slice(-2) === specialPrizeLast2;
    if (match3) return amt * baCangPayout;
    if (match2) return amt * baCangApMa;
    return 0;
  });
  const baCangVonChuyen = baCangLayoff.costSum * (baCangComm / 100);
  const baCangTrungChuyen = baCangLayoff.winSum;

  const baCangLoLayoff = getLayoffValues(baCangLoSums, (key, amt) => {
    const occurrences = allPrizesLast3.filter(p => p === key).length;
    return occurrences * amt * baCangLoPayout;
  });
  const baCangLoVonChuyen = baCangLoLayoff.costSum * (baCangLoCost / 100);
  const baCangLoTrungChuyen = baCangLoLayoff.winSum;

  const totalVonChuyen = deVonChuyen + loVonChuyen + xienVonChuyen + baCangVonChuyen + baCangLoVonChuyen;
  const totalTrungChuyen = deTrungChuyen + loTrungChuyen + xienTrungChuyen + baCangTrungChuyen + baCangLoTrungChuyen;

  // 3. Render Kết quả list with formatHeaderMoney
  const formatHeaderMoney = (von, trung) => {
    return `(${Math.round(von).toLocaleString('vi-VN')} / ${Math.round(trung).toLocaleString('vi-VN')})`;
  };

  renderGroupResult(`🔴 Đề ${formatHeaderMoney(deVon, deTrung)}`, deSums, false);
  renderGroupResult(`🔵 Lô(đ) ${formatHeaderMoney(loVon, loTrung)} <span class="text-yellow-600 dark:text-yellow-400">[${Math.round(loBetSum)}đ / ${Math.round(loWinSum)}đ]</span>`, loSums, true);

  if (xienBets.length > 0 && resultDiv) {
    const header = document.createElement("div");
    header.innerHTML = `<strong>🟢 Xiên ${formatHeaderMoney(xienVon, xienTrung)}</strong>`;
    header.className = "mt-2 border-b border-gray-100 dark:border-gray-700 pb-1 text-emerald-600 dark:text-emerald-500 text-xs";
    resultDiv.appendChild(header);
    xienBets.forEach(bet => {
      const div = document.createElement("div");
      const allHit = bet.numbers.every(num => allPrizesLast2.includes(num));
      div.textContent = `${bet.numbers.join('-')} = ${bet.amount}`;

function calculateResult(row) {
  const input = parseFloat(document.getElementById(`input${row}`).value) || 0;
  const bonus = parseFloat(document.getElementById(`bonus${row}`).value) || 0;
  const percentage = parseFloat(document.getElementById(`percentage${row}`).value) || 0;

  let result = 0;
  let bonusResult = 0;

  if (row === 2) {
    // For Lô, percentage is price per point, e.g. 21.7 (which is 21.7k)
    // Cost = points * cost_per_point
    result = Math.round(input * percentage);
    // Payout = winning points * 80
    bonusResult = Math.round(bonus * 80);
  } else if (row === 1) {
    // For Đề, percentage is commission, e.g. 82%
    // Cost = input * 82%
    result = Math.round(input * percentage / 100);
    // Payout = winning amount * 80
    bonusResult = Math.round(bonus * 80);
  } else if (row === 3 || row === 4) {
    // For Xiên and Ba Càng, percentage is commission
    result = Math.round(input * percentage / 100);
    // Payout is calculated automatically and set as bonus value in thousands
    bonusResult = bonus;
  }

  const rEl = document.getElementById(`result${row}`);
  const bEl = document.getElementById(`bonusResult${row}`);
  if (rEl) rEl.textContent = isNaN(result) ? "0" : result;
  if (bEl) bEl.textContent = isNaN(bonusResult) ? "0" : bonusResult;

  calculateTotal();
}

function calculateTotal() {
  let total = 0;
  let bonusTotal = 0;

  for (let i = 1; i <= 4; i++) {
    const rEl = document.getElementById(`result${i}`);
    const bEl = document.getElementById(`bonusResult${i}`);
    total += rEl ? (parseInt(rEl.textContent) || 0) : 0;
    bonusTotal += bEl ? (parseInt(bEl.textContent) || 0) : 0;
  }

  const tEl = document.getElementById('total');
  const btEl = document.getElementById('bonusTotal');
  if (tEl) tEl.textContent = total;
  if (btEl) btEl.textContent = bonusTotal;
  
  calculateFinalResult();
}

function calculateFinalResult() {
  const tEl = document.getElementById('total');
  const btEl = document.getElementById('bonusTotal');
  const fEl = document.getElementById('finalResult');

  const total = tEl ? (parseInt(tEl.textContent) || 0) : 0;
  const bonusTotal = btEl ? (parseInt(btEl.textContent) || 0) : 0;
  const finalResult = total - bonusTotal;

  if (fEl) fEl.textContent = finalResult;
}

function normalizeTwentySevenNumbers() {
  const el = document.getElementById("allPrizesInput") || document.getElementById("twentySevenNumbers");
  if (!el) return;
  const raw = el.value.trim();
  if (!raw) return;

  // Extract special prize if present (e.g. Đặc biệt\n31854 or db 31854)
  const dbMatch = raw.match(/(?:đặc\s+biệt|db|đb)[\s\r\n\t]+(\d+)/i);
  if (dbMatch) {
    const dbValue = dbMatch[1];
    const dbInput = document.getElementById("specialPrizeInput") || document.getElementById("specialPrize");
    if (dbInput) {
      dbInput.value = dbValue;
    }
  }

  const tokens = raw.split(/[\s,;\t\n\r.\-+*]+/).map(n => n.trim());
  const numbers = tokens.filter(n => n.length >= 2 && n.length <= 5 && /^\d+$/.test(n));
  el.value = numbers.join(', ');
  updateTwoDigitBoard();
}

function copyText() {
  let textToCopy = document.getElementById("modifiedResult").innerText;
  textToCopy = textToCopy.replace(/^(?:🔴|🔵|🟤|🟢|🟣)\s*(Đề|Lô\(đ\)|3cLô|Xiên|3C)\s*\(.*?$/gm, "$1");
  textToCopy = textToCopy.replace(/^Lô\(đ\)$/gm, "Lô");
  copyToClipboard(textToCopy, "Đã sao chép kết quả thành công!");
}

function copyInputList() {
  const inputListContent = document.getElementById("inputList").innerText;

}

function copyToClipboard(text, successMessage) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => alert(successMessage))
      .catch(err => {
        console.error("Lỗi sao chép: ", err);
        alert("Sao chép thất bại. Vui lòng thử lại.");
      });
  } else {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    
    try {
      const successful = document.execCommand("copy");
      if (successful) {
        alert(successMessage);
      } else {
        throw new Error("Sao chép không thành công");
      }
    } catch (err) {
      console.error("Lỗi sao chép: ", err);
      alert("Sao chép thất bại. Vui lòng thử lại.");
    } finally {
      document.body.removeChild(textArea);
    }
  }
}

function clearDefaultValue(inputField) {

function restoreDefaultValue(inputField) {

const RATES_STORAGE_KEY = 'lucky_wheel_rates';
const DEFAULT_RATES = {
  rateDeComm: 82,
  rateDePayout: 80,
  rateLoCost: 2165,
  rateLoPayout: 80,
  rateXienComm: 65,
  rateXien2Payout: 11,
  rateXien3Payout: 45,
  rateXien4Payout: 140,
  rate3CComm: 75,
  rate3CPayout: 400,
  rate3CApMa: 5,
  rate3CLoCost: 75,
  rate3CLoPayout: 20
};

function loadRates() {
  const saved = localStorage.getItem(RATES_STORAGE_KEY);
  let rates = DEFAULT_RATES;
  if (saved) {
    try {
      let parsed = JSON.parse(saved);
      // Migrate old Lô point rates to new defaults
      if (parsed.rateLoCost > 10000) {
        parsed.rateLoCost = 2165; // migrate to 2165
      }
      if (parsed.rateLoPayout > 1000) {
        parsed.rateLoPayout = 80; // migrate to 80
      }
      // Migrate old Xiên rates to new defaults
      if (parsed.rateXien2Payout === 15) {
        parsed.rateXien2Payout = 11;
      }
      if (parsed.rateXien3Payout === 50) {
        parsed.rateXien3Payout = 45;
      }
      if (parsed.rateXien4Payout === 120) {
        parsed.rateXien4Payout = 140;
      }
      // Migrate old 3C Lô point rates to percentage rates
      if (parsed.rate3CLoCost > 100) {
        parsed.rate3CLoCost = 75; // migrate to 75%
      }
      if (parsed.rate3CLoPayout > 100) {
        parsed.rate3CLoPayout = 20; // migrate to 1 ăn 20
      }
      rates = Object.assign({}, DEFAULT_RATES, parsed);
    } catch (e) {
      console.error("Error parsing saved rates", e);
    }
  }
  Object.entries(rates).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) {
      el.value = (val !== undefined && val !== null) ? val.toString() : '';
    }
  });
}

function saveRates() {
  const rates = {};
  Object.keys(DEFAULT_RATES).forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      const valStr = el.value || '';
      const valCleaned = valStr.toString().replace(/,/g, '.').trim();
      const valParsed = parseFloat(valCleaned);
      rates[id] = isNaN(valParsed) ? DEFAULT_RATES[id] : valParsed;
    }
  });
  localStorage.setItem(RATES_STORAGE_KEY, JSON.stringify(rates));
}

    });
    retainNumber.addEventListener('input', calculateSum);
  }

  document.querySelectorAll('input[name="retainType"]').forEach(radio => {
    radio.addEventListener('change', calculateSum);
  });

  // Summary Table listeners
  for (let i = 1; i <= 4; i++) {
    const input = document.getElementById(`input${i}`);
    const bonus = document.getElementById(`bonus${i}`);
    const percentage = document.getElementById(`percentage${i}`);
    
    if (input) {
      input.addEventListener('focus', () => clearDefaultValue(input));
      input.addEventListener('blur', () => restoreDefaultValue(input));
      input.addEventListener('input', () => calculateResult(i));
    }
    
    if (bonus) {
      bonus.addEventListener('focus', () => clearDefaultValue(bonus));
      bonus.addEventListener('blur', () => restoreDefaultValue(bonus));
      bonus.addEventListener('input', () => calculateResult(i));
    }
    
    if (percentage) {
      percentage.addEventListener('focus', () => clearDefaultValue(percentage));
      percentage.addEventListener('blur', () => restoreDefaultValue(percentage));
      percentage.addEventListener('input', () => calculateResult(i));
    }
  }

  // Dark mode
  const modeToggle = document.getElementById('darkModeToggle');
  if (modeToggle) {
    modeToggle.addEventListener('click', toggleDarkMode);
  }

  // Modal Price Config listeners
  const btnPriceConfig = document.getElementById('btnPriceConfig');
  const modalPriceConfig = document.getElementById('modalPriceConfig');
  const btnClosePriceConfig = document.getElementById('btnClosePriceConfig');
  const btnClosePriceConfigBtn = document.getElementById('btnClosePriceConfigBtn');
  const btnResetRates = document.getElementById('btnResetRates');

  if (btnPriceConfig && modalPriceConfig) {
    btnPriceConfig.addEventListener('click', () => {
      loadRates();
      modalPriceConfig.classList.remove('hidden');
    });

    const closeModal = () => {
      saveRates();
      modalPriceConfig.classList.add('hidden');
      calculateSum(); // recalculate automatically on close!
    };

    if (btnClosePriceConfig) btnClosePriceConfig.addEventListener('click', closeModal);
    if (btnClosePriceConfigBtn) btnClosePriceConfigBtn.addEventListener('click', closeModal);

    modalPriceConfig.addEventListener('click', (e) => {
      if (e.target === modalPriceConfig) {
        closeModal();
      }
    });
  }

  if (btnResetRates) {
    btnResetRates.addEventListener('click', () => {
      if (confirm("Bạn có chắc chắn muốn khôi phục giá trị cấu hình mặc định không?")) {
        localStorage.removeItem(RATES_STORAGE_KEY);
        loadRates();
        calculateSum();
      }
    });
  }

  // Copy report listener
  const btnCopyTextReport = document.getElementById("btnCopyTextReport");
  if (btnCopyTextReport) {
    btnCopyTextReport.addEventListener("click", () => {
      const data = window.lastCalculatedReport;
      if (!data) {
        alert("Vui lòng thực hiện tính toán báo cáo trước!");
        return;
      }

      const formatMoneyK = (val) => {
        return Math.round(val).toLocaleString('vi-VN');
      };

      const rawDate = data.date;
      const dayMonthText = rawDate.split('/').slice(0, 2).join('/'); // "29/06"

      const headerText = `BÁO CÁO - ${dayMonthText}`;

      const deStr = `Đề: ${formatMoneyK(data.deXac)} / ${formatMoneyK(data.deTrung)}`;
      const loStr = `Lô: ${data.loXac} / ${data.loTrung}`;
      const xienStr = `Xiên: ${formatMoneyK(data.xienXac)} / ${formatMoneyK(data.xienTrung)}`;
      const baCangStr = `3c: ${formatMoneyK(data.baCangXac)} / ${formatMoneyK(data.baCangTrung)}`;
      const baCangLoStr = `3c Lô: ${formatMoneyK(data.baCangLoXac)} / ${formatMoneyK(data.baCangLoTrung)}`;
      
      const netLabelText = data.totalNet < 0 ? "LẤY VỀ" : "NỘP";
      const netValK = formatMoneyK(Math.abs(data.totalNet));

      const reportText = `${headerText}\n` +
        `${deStr}\n` +
        `${loStr}\n` +
        `${xienStr}\n` +
        `${baCangStr}\n` +
        `${baCangLoStr}\n` +
        `${netLabelText}: ${netValK}`;

      navigator.clipboard.writeText(reportText).then(() => {
        alert("Đã copy báo cáo vào clipboard!");
      }).catch(err => {
        console.error("Lỗi copy báo cáo:", err);
        // Fallback using prompt
        window.prompt("Copy báo cáo tại đây:", reportText);
      });
    });
  }
}

// Helpers for ex.html compatibility
function updateRowNumbers() {
  const rows = document.querySelectorAll('tbody tr');
  rows.forEach((row, index) => {
    const numberCell = row.querySelector('.row-number');
    if (numberCell) numberCell.textContent = index + 1;
  });
}

function calculateNSum() {
  const rows = document.querySelectorAll('tbody tr');
  let sum = 0;
  rows.forEach((row) => {
    const input = row.querySelector('.col1');
    if (input) {
      const inputValue = parseFloat(input.value.replace(',', '.')) || 0;
      sum += inputValue;
    }
  });
  const formattedSum = sum.toLocaleString('en-US', {
    minimumFractionDigits: 0,
    maximumFractionDigits: 3
  });
  const totalCell = document.getElementById('totalCol1');
  if (totalCell) totalCell.textContent = formattedSum;
}

function handleKeyDown(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    const currentInput = event.target;
    const currentValue = currentInput.value.trim();
    if (currentValue !== '') {
      const currentRow = currentInput.closest('tr');
      const isLastRow = currentRow === document.querySelector('tbody tr:last-child');
      if (isLastRow) {
        addNewRow();
        setTimeout(() => {
          const newRowInput = document.querySelector('tbody tr:last-child .col1');
          if (newRowInput) newRowInput.focus();
        }, 0);
      } else {
        const nextRow = currentRow.nextElementSibling;
        if (nextRow) {
          const nextInput = nextRow.querySelector('.col1');
          if (nextInput) nextInput.focus();
        }
      }
    }
  }
}

function addNewRow() {
  const tableBody = document.querySelector('tbody');
  if (!tableBody) return;
  const newRow = document.createElement('tr');

  const numberCell = document.createElement('td');
  numberCell.className = 'row-number p-2 border border-gray-300 text-center';
  numberCell.textContent = tableBody.children.length + 1;
  newRow.appendChild(numberCell);

  const newCell = document.createElement('td');
  newCell.className = 'p-2 border border-gray-300';
  const newInput = document.createElement('input');
  newInput.type = 'number';
  newInput.className = 'col1 w-full p-1 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500';
  newInput.oninput = function () {
    calculateNSum();
  };
  newInput.onkeydown = function (event) {
    handleKeyDown(event);
  };
  newCell.appendChild(newInput);
  newRow.appendChild(newCell);
  tableBody.appendChild(newRow);

  updateRowNumbers();
}

if (document.querySelector('tbody')) {
  document.addEventListener('DOMContentLoaded', function() {
    const firstInput = document.querySelector('tbody tr:first-child .col1');
    if (firstInput) {
      firstInput.focus();
    }
  });
}

function resetTable() {
  const tableBody = document.querySelector('tbody');
  if (!tableBody) return;
  while (tableBody.children.length > 1) {
    tableBody.removeChild(tableBody.lastChild);
  }
  const firstInput = tableBody.querySelector('.col1');
  if (firstInput) {
    firstInput.value = '';
    firstInput.focus();
  }
  const totalCol1 = document.getElementById('totalCol1');
  if (totalCol1) totalCol1.textContent = '0';
}

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const shortcutsArea = document.getElementById('shortcuts');
      const STORAGE_KEY = 'lucky_wheel_shortcuts';
      const DATA_URL = 'https://raw.githubusercontent.com/doducdungvn/doducdungvn.github.io/refs/heads/main/nhaptat.txt';

      // Nếu không tìm thấy ô nhập tắt thì dừng
      if (!shortcutsArea) return;

      // Hàm lưu vào LocalStorage
      const saveToStorage = () => {
        localStorage.setItem(STORAGE_KEY, shortcutsArea.value);
      };

      // 1. Tải dữ liệu từ LocalStorage ra trước
      const savedData = localStorage.getItem(STORAGE_KEY);
      if (savedData !== null) {
        shortcutsArea.value = savedData;
      }

      // 2. Chỉ tải từ URL nếu ô nhập liệu TRỐNG (lần đầu hoặc đã xóa hết)
      if (!shortcutsArea.value.trim()) {
        fetch(DATA_URL)
          .then(response => {
            if (!response.ok) throw new Error('Kết nối thất bại');
            return response.text();
          })
          .then(text => {
            shortcutsArea.value = text;
            saveToStorage(); // Lưu luôn dữ liệu mặc định vào storage
          })
          .catch(error => {
            console.error('Lỗi tải dữ liệu nhập tắt mặc định:', error);
            shortcutsArea.placeholder = "Không thể tải dữ liệu mặc định. Vui lòng kiểm tra kết nối.";
