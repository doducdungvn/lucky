<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tính Tổng Thông Minh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for a polished look */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    
    /* Smooth fade in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            primary: {"50":"#ecfdf5","100":"#d1fae5","200":"#a7f3d0","300":"#6ee7b7","400":"#34d399","500":"#10b981","600":"#059669","700":"#047857","800":"#065f46","900":"#064e3b","950":"#022c22"},
            burgundy: {"50":"#fff1f2","100":"#ffe4e6","200":"#fecdd3","300":"#fda4af","400":"#fb7185","500":"#f43f5e","600":"#e11d48","700":"#be123c","800":"#9f1239","900":"#881337","950":"#4c0519"}
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 antialiased selection:bg-primary-200 selection:text-primary-900">
  
  <!-- Navigation/Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-burgundy-600 flex items-center justify-center text-white shadow-lg shadow-primary-500/30">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary-700 to-burgundy-700">Tính Tổng Chuyên Nghiệp</h1>
          <p class="text-xs text-gray-500 font-medium">Hỗ trợ Tách / Gộp dữ liệu</p>
        </div>
      </div>
      <button onclick="window.location.href='index.html'" class="px-4 py-2 text-sm font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" /></svg>
        Quay lại
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8 items-start">
      
      <!-- Left Column: Current Input -->
      <div class="lg:col-span-7 space-y-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-full">
          <!-- Card Header -->
          <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" /></svg>
              Bảng Tính Hiện Tại
            </h2>
            <button onclick="resetCurrentTable()" class="text-sm font-medium text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-md transition-colors">
              Xóa tất cả
            </button>
          </div>

          <!-- Table Content -->
          <div class="p-6 flex-grow">
            <div class="overflow-hidden rounded-xl border border-gray-200">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="bg-gray-50 border-b border-gray-200">
                    <th class="py-3 px-4 font-semibold text-sm text-gray-600 w-16 text-center">STT</th>
                    <th class="py-3 px-4 font-semibold text-sm text-gray-600">Giá trị</th>
                    <th class="py-3 px-4 font-semibold text-sm text-gray-600 w-16 text-center"></th>
                  </tr>
                </thead>
                <tbody id="inputTableBody" class="divide-y divide-gray-100">
                  <!-- Rows injected by JS -->
                </tbody>
              </table>
            </div>
            <div class="mt-4 flex justify-between items-end">
               <button onclick="addRow()" class="text-sm font-medium text-primary-600 hover:text-primary-700 flex items-center gap-1 py-2 px-3 rounded-lg hover:bg-primary-50 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                  Thêm dòng mới
               </button>
               <div class="text-right">
                  <span class="text-sm text-gray-500 font-medium mr-3">Tổng cộng:</span>
                  <span id="currentTotal" class="text-3xl font-extrabold text-primary-600 tracking-tight">0</span>
               </div>
            </div>
          </div>

          <!-- Actions Footer -->
          <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex gap-4 justify-end rounded-b-2xl">
            <button onclick="splitGroup()" class="px-6 py-2.5 bg-white border-2 border-primary-500 text-primary-600 font-bold rounded-xl hover:bg-primary-50 focus:ring-4 focus:ring-primary-100 transition-all flex items-center gap-2 shadow-sm">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z" /></svg>
              Lưu Tách (Split)
            </button>
            <button onclick="mergeGroups()" class="px-6 py-2.5 bg-gradient-to-r from-primary-600 to-burgundy-700 text-white font-bold rounded-xl hover:from-primary-700 hover:to-burgundy-800 focus:ring-4 focus:ring-primary-200 transition-all flex items-center gap-2 shadow-md hover:shadow-lg hover:-translate-y-0.5">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" /></svg>
              Gộp Tất Cả (Merge)
            </button>
          </div>
        </div>
      </div>

      <!-- Right Column: History List -->
      <div class="lg:col-span-5 h-full">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 h-full flex flex-col sticky top-20 max-h-[calc(100vh-7rem)]">
          <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-burgundy-600" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd" /></svg>
              Lịch Sử Tách
            </h2>
            <span id="historyBadge" class="bg-burgundy-100 text-burgundy-800 text-xs font-bold px-2.5 py-1 rounded-full">0 phần</span>
          </div>
          <div id="historyContainer" class="p-6 overflow-y-auto flex-grow space-y-4">
            <!-- Empty State -->
            <div id="emptyHistoryState" class="flex flex-col items-center justify-center h-full text-center py-10 opacity-60">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
              <p class="text-sm font-medium text-gray-500">Chưa có phần nào được tách.</p>
              <p class="text-xs text-gray-400 mt-1">Nhập số liệu và nhấn <strong>Lưu Tách</strong> để lưu lại đây.</p>
            </div>
            <!-- History Cards Injected by JS -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Merge Modal -->
  <div id="mergeModal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-hidden flex flex-col transform scale-95 transition-transform duration-300" id="mergeModalContent">
      <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <h2 class="text-xl font-extrabold text-gray-800 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary-600" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" /></svg>
          Kết Quả Gộp
        </h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 p-2 rounded-xl transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      
      <div class="p-6 overflow-y-auto flex-grow bg-gray-50/30">
        <!-- Grand Total -->
        <div class="bg-gradient-to-br from-primary-600 to-burgundy-700 rounded-2xl p-6 text-white text-center shadow-lg mb-8 relative overflow-hidden">
          <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNykiLz48L3N2Zz4=')] opacity-30"></div>
          <p class="text-primary-100 font-medium text-sm mb-1 relative z-10 tracking-widest uppercase">Tổng Gộp Toàn Bộ</p>
          <div id="modalGrandTotal" class="text-5xl font-black relative z-10">0</div>
        </div>
        
        <!-- Detailed Breakdown -->
        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 border-b border-gray-200 pb-2">Chi tiết các lần tách</h3>
        <div id="modalBreakdown" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Breakdowns injected by JS -->
        </div>
      </div>
      
      <div class="px-6 py-4 border-t border-gray-100 bg-white flex justify-end">
        <button onclick="closeModal()" class="px-6 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl transition-colors">Đóng</button>
      </div>
    </div>
  </div>

  <script>
    // --- STATE ---
    let rowCount = 1;
    let separatedGroups = [];

    // --- DOM ELEMENTS ---
    const tableBody = document.getElementById("inputTableBody");
    const currentTotalEl = document.getElementById("currentTotal");
    const historyContainer = document.getElementById("historyContainer");
    const emptyHistoryState = document.getElementById("emptyHistoryState");
    const historyBadge = document.getElementById("historyBadge");
    
    // --- FORMATTING UTILS ---
    const formatNumber = (num) => isNaN(num) ? "0" : new Intl.NumberFormat('vi-VN').format(num);

    // --- CURRENT TABLE LOGIC ---
    function renderCurrentTable() {
      // Create at least one row if empty
      if (tableBody.children.length === 0) {
        addRow();
      }
      updateRowNumbers();
      calculateCurrentTotal();
    }

    function addRow(focus = true) {
      rowCount++;
      const tr = document.createElement("tr");
      tr.className = "group hover:bg-gray-50/80 transition-colors animate-fade-in";
      tr.innerHTML = `
        <td class="py-2 px-4 text-center text-gray-400 font-medium text-sm row-number"></td>
        <td class="py-2 px-4">
          <input type="number" 
                 class="value-input w-full p-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all shadow-sm text-lg font-semibold text-gray-700 placeholder-gray-300" 
                 placeholder="0"
                 oninput="calculateCurrentTotal()" 
                 onkeydown="handleKeyDown(event, this)">
        </td>
        <td class="py-2 px-4 text-center">
          <button onclick="deleteRow(this)" class="p-2 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-lg opacity-0 group-hover:opacity-100 transition-all focus:opacity-100" title="Xóa dòng">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
          </button>
        </td>
      `;
      tableBody.appendChild(tr);
      updateRowNumbers();
      
      if (focus) {
        const input = tr.querySelector('.value-input');
        if (input) input.focus();
      }
    }

    function deleteRow(btn) {
      if (tableBody.children.length > 1) {
        const tr = btn.closest("tr");
        tr.style.opacity = '0';
        tr.style.transform = 'translateY(-10px)';
        setTimeout(() => {
          tr.remove();
          updateRowNumbers();
          calculateCurrentTotal();
        }, 150);
      } else {
        // Just clear the first row instead of deleting if it's the only one
        tableBody.querySelector('.value-input').value = "";
        calculateCurrentTotal();
      }
    }

    function updateRowNumbers() {
      const rows = tableBody.querySelectorAll("tr");
      rows.forEach((row, index) => {
        row.querySelector(".row-number").textContent = index + 1;
      });
    }

    function handleKeyDown(event, inputElement) {
      if (event.key === "Enter") {
        event.preventDefault();
        addRow(true);
      }
    }

    function calculateCurrentTotal() {
      let sum = 0;
      const inputs = tableBody.querySelectorAll(".value-input");
      inputs.forEach(input => {
        const val = parseFloat(input.value);
        if (!isNaN(val)) sum += val;
      });
      currentTotalEl.textContent = formatNumber(sum);
      return sum;
    }

    function resetCurrentTable() {
      tableBody.innerHTML = '';
      addRow(true);
      calculateCurrentTotal();
    }

    // --- SEPARATE / SPLIT LOGIC ---
    function splitGroup() {
      const inputs = tableBody.querySelectorAll(".value-input");
      const values = [];
      let sum = 0;
      
      inputs.forEach(input => {
        const val = parseFloat(input.value);
        if (!isNaN(val)) {
          values.push(val);
          sum += val;
        }
      });

      if (values.length === 0 || sum === 0) {
        alert("Bảng hiện tại đang trống hoặc tổng bằng 0.");
        return;
      }

      // Add to history
      separatedGroups.push({
        id: Date.now(),
        values: values,
        total: sum
      });

      renderHistory();
      resetCurrentTable();
    }

    function renderHistory() {
      if (separatedGroups.length === 0) {
        emptyHistoryState.style.display = 'flex';
        historyBadge.textContent = `0 phần`;
        return;
      }
      
      emptyHistoryState.style.display = 'none';
      historyBadge.textContent = `${separatedGroups.length} phần`;
      
      // Clear existing cards
      const cards = historyContainer.querySelectorAll('.history-card');
      cards.forEach(c => c.remove());

      // Render cards in reverse order (newest first)
      [...separatedGroups].reverse().forEach((group, index) => {
        const groupNum = separatedGroups.length - index;
        const card = document.createElement("div");
        card.className = "history-card bg-white border border-gray-200 rounded-xl p-4 shadow-sm animate-fade-in group hover:shadow-md transition-shadow relative overflow-hidden";
        
        // Add a tiny colored strip on the left based on index
        const colors = ['bg-primary-500', 'bg-burgundy-500', 'bg-amber-500', 'bg-purple-500', 'bg-pink-500', 'bg-sky-500'];
        const stripColor = colors[groupNum % colors.length];
        
        card.innerHTML = `
          <div class="absolute left-0 top-0 bottom-0 w-1 ${stripColor}"></div>
          <div class="flex justify-between items-center mb-3 pl-2">
            <h3 class="font-bold text-gray-700">Lần tách ${groupNum}</h3>
            <span class="text-sm font-black text-gray-800 bg-gray-100 px-3 py-1 rounded-lg">${formatNumber(group.total)}</span>
          </div>
          <div class="pl-2">
            <div class="flex flex-wrap gap-1.5">
              ${group.values.map(v => `<span class="inline-block bg-gray-50 border border-gray-100 text-gray-600 text-xs px-2 py-1 rounded-md font-mono">${formatNumber(v)}</span>`).join('')}
            </div>
          </div>
          <button onclick="deleteHistoryGroup(${group.id})" class="absolute top-2 right-2 p-1.5 bg-white text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-lg opacity-0 group-hover:opacity-100 transition-all shadow-sm border border-transparent hover:border-red-100" title="Xóa phần này">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
          </button>
        `;
        historyContainer.appendChild(card);
      });
    }

    function deleteHistoryGroup(id) {
      separatedGroups = separatedGroups.filter(g => g.id !== id);
      renderHistory();
    }

    // --- MERGE LOGIC ---
    function mergeGroups() {
      if (separatedGroups.length === 0) {
        alert("Chưa có phần tách nào để gộp.");
        return;
      }
      
      const modal = document.getElementById("mergeModal");
      const modalContent = document.getElementById("mergeModalContent");
      const grandTotalEl = document.getElementById("modalGrandTotal");
      const breakdownEl = document.getElementById("modalBreakdown");
      
      let grandTotal = 0;
      breakdownEl.innerHTML = '';
      
      separatedGroups.forEach((group, index) => {
        grandTotal += group.total;
        
        const block = document.createElement("div");
        block.className = "bg-white border border-gray-200 rounded-xl p-4 shadow-sm";
        block.innerHTML = `
          <div class="flex justify-between items-center mb-2 border-b border-gray-100 pb-2">
            <span class="font-bold text-gray-700 text-sm">Lần tách ${index + 1}</span>
            <span class="font-black text-primary-600">${formatNumber(group.total)}</span>
          </div>
          <div class="flex flex-wrap gap-1">
            ${group.values.map(v => `<span class="inline-block text-gray-500 text-xs bg-gray-50 px-1.5 py-0.5 rounded border border-gray-100 font-mono">${formatNumber(v)}</span>`).join(', ')}
          </div>
        `;
        breakdownEl.appendChild(block);
      });
      
      grandTotalEl.textContent = formatNumber(grandTotal);
      
      // Show modal with animation
      modal.classList.remove("opacity-0", "pointer-events-none");
      modalContent.classList.remove("scale-95");
    }

    function closeModal() {
      const modal = document.getElementById("mergeModal");
      const modalContent = document.getElementById("mergeModalContent");
      
      modal.classList.add("opacity-0", "pointer-events-none");
      modalContent.classList.add("scale-95");
    }

    // Initialize on load
    document.addEventListener("DOMContentLoaded", () => {
      renderCurrentTable();
      renderHistory();
    });
  </script>
</body>
</html>
